<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="auto">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    <style>
      .title {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        font-size: 44px;
        fill: url(#textGrad);
        letter-spacing: 4px;
        animation: textOpacity 3s ease-in-out infinite alternate;
      }
      
      .subtitle {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
        font-size: 14px;
        fill: #9ca3af;
        opacity: 0;
        animation: fadeIn 2s ease-in-out forwards;
        animation-delay: 0.8s;
      }
      
      .line {
        stroke: url(#textGrad);
        stroke-dasharray: 600;
        stroke-dashoffset: 600;
        animation: drawLine 2s ease-out forwards;
        animation-delay: 0.2s;
      }

      /* Animated grid/nodes */
      .node {
        fill: #00f2fe;
        opacity: 0.3;
        animation: pulse 4s ease-in-out infinite;
      }

      .node-delayed {
        fill: #4facfe;
        opacity: 0.2;
        animation: pulse-delayed 5s ease-in-out infinite;
      }

      .wave-path {
        fill: none;
        stroke: rgba(0, 242, 254, 0.08);
        stroke-width: 1.5;
        stroke-dasharray: 1200;
        stroke-dashoffset: 1200;
        animation: drawWave 12s linear infinite;
      }

      @keyframes drawLine {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes textOpacity {
        from {
          opacity: 0.9;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(1.4); opacity: 0.7; }
      }

      @keyframes pulse-delayed {
        0%, 100% { transform: scale(1); opacity: 0.2; }
        50% { transform: scale(1.6); opacity: 0.6; }
      }

      @keyframes drawWave {
        0% { stroke-dashoffset: 1200; }
        100% { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="10" />

  <!-- Animated background elements (nodes & waves) -->
  <path class="wave-path" d="M -50 150 Q 150 50 350 150 T 750 150" style="animation-duration: 15s;" />
  <path class="wave-path" d="M 0 100 Q 200 180 400 100 T 800 100" style="animation-duration: 10s;" />

  <!-- Background Grid Nodes -->
  <circle class="node" cx="700" cy="50" r="3" />
  <circle class="node-delayed" cx="650" cy="130" r="4" style="animation-delay: 1s;" />
  <circle class="node" cx="120" cy="60" r="2.5" style="animation-delay: 0.5s;" />
  <circle class="node-delayed" cx="180" cy="140" r="3" style="animation-delay: 2s;" />
  <circle class="node" cx="50" cy="110" r="2.5" style="animation-delay: 1.5s;" />
  <circle class="node-delayed" cx="740" cy="100" r="3.5" style="animation-delay: 0.8s;" />

  <!-- Connecting faint lines -->
  <line x1="650" y1="130" x2="740" y2="100" stroke="rgba(79, 172, 254, 0.12)" stroke-width="1" />
  <line x1="700" y1="50" x2="740" y2="100" stroke="rgba(0, 242, 254, 0.12)" stroke-width="1" />
  <line x1="120" y1="60" x2="180" y2="140" stroke="rgba(0, 242, 254, 0.12)" stroke-width="1" />

  <!-- Content Group -->
  <g transform="translate(80, 65)">
    <!-- Main Title -->
    <text x="0" y="30" class="title">SRIRAM S</text>
    
    <!-- Accent Line -->
    <line x1="0" y1="46" x2="400" y2="46" stroke-width="2" class="line" />
    
    <!-- Subtitle / Roles -->
    <text x="0" y="72" class="subtitle">Full Stack Developer | Cloud &amp; AI Integration | Mobile App Developer</text>
  </g>
</svg>